    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Landing Page - CDM LaF</title>
        <link rel="stylesheet" href="landinglost.css">
    </head>
    <body>




        <main class="main-content">
            <div class="header-section">
                <div class="logo-background">
                    <img class="school-logo" src="LPCDMLOGO.png" alt="Logo">
                </div>
                <div class="header-titles">
                    <h1>COLEGIO DE MUNTINLUPA</h1>
                    <h2>Office of the Prefect of Discipline</h2>
                
                </div>
            </div>
            <div class="divs-container">
                <div class="left-div">
                    <h1>LOST AND FOUND</h1>
                    <p>Easily browse and claim lost items found 
                    within the Colegio De Muntinlupa campus. 
                    Continue to check if your belongings have 
                    been turned in.</p>
                    <button id="continueGuestBtn" class="blue-button"><img src="LP-USER_ICON.png" alt="Login" width="30px" height="30px"> Continue as guest</button>
                </div>
                <div class="right-div">
                    <img src="cdmunblurred.jpg" alt="CDM" class="admin-image">
                    <h2>Login as administrator</h2>
                    <input type="text" placeholder="Username" class="admin-input">
                    <input type="password" placeholder="Password" class="admin-input">
                    <div id="errorMessage" style="color: red; display: none;"></div>
                    <button id="loginBtn" class="login-button"><img src="LP-LOGIN_ICON.png" alt="Login Icon" width="30px" height="30px"> Login</button>
                </div>
            </div>
        </main>
    <script src="landingpagestuff.js"></script>
    </body>
    </html>
